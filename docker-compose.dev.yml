services:
  db:
    ports:
      - "3307:3306"    # expose DB locally for debugging

  frontend:
    build: !reset null  # don't build the nginx image
    image: node:20-alpine
    container_name: smartfin_frontend_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:3000/api
      - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
