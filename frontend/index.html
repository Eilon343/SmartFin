<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport: cover fills behind notch/home indicator -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>SmartFin</title>
    <meta name="description" content="Personal Finance OS" />

    <!-- PWA theme -->
    <meta name="theme-color" content="#07090d" />

    <!-- PWA: enables full-screen standalone mode (both iOS and Android Chrome) -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent: status bar overlays app (transparent), shows content behind it -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SmartFin" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- iOS home screen icon (generated by pwa-assets-generator) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />

    <!-- Prevent iOS from styling phone numbers as links -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
